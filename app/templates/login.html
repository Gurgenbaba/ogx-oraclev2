<!DOCTYPE html>
<html lang="{{ lang or 'en' }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login — OGX Oracle</title>
  <meta name="csrf-token" content="{{ csrf_token }}">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/static/app.css" />
  <link rel="stylesheet" href="/static/login.css" />
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico?v=2" />
  <script>window.I18N = {{ i18n_js | tojson }};</script>
</head>
<body>

<div class="login-wrap">

  <div class="login-logo">
    <a href="/">
      <div class="brand-row">
        <span class="ogx">OGX</span>
        <span class="oracle">Oracle</span>
      </div>
      <span class="tagline">// Galaxy Intelligence System</span>
    </a>
  </div>

  <div class="login-card">

    <div class="login-tabs">
      <button class="login-tab active" id="tab-login" type="button">{{ t('auth.login') }}</button>
      <button class="login-tab" id="tab-register" type="button">{{ t('auth.register') }}</button>
    </div>

    <div class="login-error" id="auth-error"></div>

    <!-- Token panel — shown after login/register, before redirect -->
    <div class="token-panel" id="token-panel">
      <div class="token-panel-head">
        <span class="token-badge" id="token-badge">✓ Login</span>
        <span class="token-label">Bearer Token</span>
        <div class="token-actions">
          <button class="login-btn" id="token-copy-btn" type="button">{{ t('auth.copy') }}</button>
          <button class="login-btn login-btn-ghost" id="token-continue-btn" type="button">Weiter →</button>
        </div>
      </div>
      <textarea class="token-ta" id="token-ta" readonly spellcheck="false"></textarea>
      <div class="token-copied" id="token-copied">{{ t('auth.copied') }}</div>
      <div class="token-hint">Header: Authorization: Bearer &lt;token&gt;</div>
      <div class="token-redirect">Weiterleitung in <span id="token-countdown">5</span>s…</div>
    </div>

    <!-- Login pane -->
    <div id="pane-login">
      <div class="login-field">
        <label for="login-user">{{ t('auth.username') }}</label>
        <input type="text" id="login-user" autocomplete="username"
               placeholder="{{ t('auth.username') | lower }}" autofocus maxlength="32" />
      </div>
      <div class="login-field login-field-last">
        <label for="login-pass">{{ t('auth.password') }}</label>
        <input type="password" id="login-pass" autocomplete="current-password"
               placeholder="{{ t('auth.password') | lower }}" />
      </div>
      <button class="login-btn" id="btn-login" type="button">{{ t('auth.login') }}</button>
    </div>

    <!-- Register pane -->
    <div id="pane-register" hidden>
      <div class="login-policy">// {{ t('auth.pw_policy', n=(settings.password_min_len if settings else 10)) }}</div>
      <div class="login-field">
        <label for="reg-user">{{ t('auth.username') }}</label>
        <input type="text" id="reg-user" autocomplete="username"
               placeholder="{{ t('auth.username') | lower }}" maxlength="32" />
      </div>
      <div class="login-field login-field-last">
        <label for="reg-pass">{{ t('auth.password') }}</label>
        <input type="password" id="reg-pass" autocomplete="new-password"
               placeholder="{{ t('auth.password') | lower }}" />
      </div>
      <button class="login-btn login-btn-ghost" id="btn-register" type="button">{{ t('auth.create_account') }}</button>
    </div>

  </div>
</div>

<script src="/static/login.js"></script>
</body>
</html>
