<!-- app/templates/login.html -->
<!doctype html>
<html lang="{{ lang or 'en' }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login — OGX Oracle</title>
  <meta name="csrf-token" content="{{ csrf_token }}">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/static/app.css" />
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico?v=2" />
</head>
<body>
  <main style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px">
    <div style="width:100%;max-width:420px">

      <!-- Logo -->
      <div style="text-align:center;margin-bottom:32px">
        <a href="/" style="display:inline-flex;align-items:baseline;gap:6px;text-decoration:none">
          <span style="font-family:'Rajdhani',sans-serif;font-size:32px;font-weight:900;color:#5ba3f5;letter-spacing:2px">OGX</span>
          <span style="font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:rgba(230,244,255,.96);letter-spacing:1px">Oracle</span>
        </a>
      </div>

      <!-- Card -->
      <div class="card" style="padding:32px">
        <h1 style="font-size:18px;font-weight:700;margin-bottom:6px">{{ t('auth.account') }}</h1>
        <p class="muted fs-13" style="margin-bottom:24px">{{ t('auth.hint') }}</p>

        <!-- Tabs -->
        <div style="display:flex;gap:4px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:4px;margin-bottom:24px">
          <button id="tab-login" onclick="switchTab('login')"
            style="flex:1;padding:9px 16px;border-radius:9px;border:none;background:rgba(91,163,245,.12);color:rgba(91,163,245,.9);font-size:13px;font-weight:700;letter-spacing:.03em;cursor:pointer;border:1px solid rgba(91,163,245,.18)">
            {{ t('auth.login') }}
          </button>
          <button id="tab-register" onclick="switchTab('register')"
            style="flex:1;padding:9px 16px;border-radius:9px;border:none;background:transparent;color:rgba(255,255,255,.45);font-size:13px;font-weight:700;letter-spacing:.03em;cursor:pointer">
            {{ t('auth.register') }}
          </button>
        </div>

        <div id="auth-error" style="display:none;margin-bottom:16px;padding:10px 14px;border-radius:10px;background:rgba(255,0,80,.12);border:1px solid rgba(255,0,80,.22);color:rgba(255,255,255,.92);font-size:13px"></div>

        <!-- Login pane -->
        <div id="pane-login">
          <div style="margin-bottom:14px">
            <label class="fs-12 muted" style="display:block;margin-bottom:6px">{{ t('auth.username') }}</label>
            <input id="login-user" type="text" autocomplete="username" required maxlength="32"
              style="width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.10);background:rgba(0,0,0,.25);color:rgba(255,255,255,.92);font-size:14px" />
          </div>
          <div style="margin-bottom:20px">
            <label class="fs-12 muted" style="display:block;margin-bottom:6px">{{ t('auth.password') }}</label>
            <input id="login-pass" type="password" autocomplete="current-password" required
              style="width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.10);background:rgba(0,0,0,.25);color:rgba(255,255,255,.92);font-size:14px" />
          </div>
          <button onclick="doLogin()" class="btn" style="width:100%;padding:13px;font-size:14px">
            {{ t('auth.login') }}
          </button>
        </div>

        <!-- Register pane -->
        <div id="pane-register" style="display:none">
          <p class="muted fs-13" style="margin-bottom:16px">{{ t('auth.pw_policy', n=(settings.password_min_len if settings else 10)) }}</p>
          <div style="margin-bottom:14px">
            <label class="fs-12 muted" style="display:block;margin-bottom:6px">{{ t('auth.username') }}</label>
            <input id="reg-user" type="text" autocomplete="username" required maxlength="32"
              style="width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.10);background:rgba(0,0,0,.25);color:rgba(255,255,255,.92);font-size:14px" />
          </div>
          <div style="margin-bottom:20px">
            <label class="fs-12 muted" style="display:block;margin-bottom:6px">{{ t('auth.password') }}</label>
            <input id="reg-pass" type="password" autocomplete="new-password" required
              style="width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.10);background:rgba(0,0,0,.25);color:rgba(255,255,255,.92);font-size:14px" />
          </div>
          <button onclick="doRegister()" class="btn ghost" style="width:100%;padding:13px;font-size:14px">
            {{ t('auth.create_account') }}
          </button>
        </div>
      </div>

    </div>
  </main>

  <script>
    window.I18N = {{ i18n_js | tojson }};

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('pane-login').style.display = isLogin ? '' : 'none';
      document.getElementById('pane-register').style.display = isLogin ? 'none' : '';
      document.getElementById('tab-login').style.background = isLogin ? 'rgba(91,163,245,.12)' : 'transparent';
      document.getElementById('tab-login').style.color = isLogin ? 'rgba(91,163,245,.9)' : 'rgba(255,255,255,.45)';
      document.getElementById('tab-login').style.border = isLogin ? '1px solid rgba(91,163,245,.18)' : 'none';
      document.getElementById('tab-register').style.background = !isLogin ? 'rgba(91,163,245,.12)' : 'transparent';
      document.getElementById('tab-register').style.color = !isLogin ? 'rgba(91,163,245,.9)' : 'rgba(255,255,255,.45)';
      document.getElementById('tab-register').style.border = !isLogin ? '1px solid rgba(91,163,245,.18)' : 'none';
      setError('');
    }

    function setError(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg;
      el.style.display = msg ? '' : 'none';
    }

    function setToken(t) {
      localStorage.setItem('ogx_jwt', t);
      document.cookie = 'ogx_token=' + t + '; path=/; SameSite=Strict; Max-Age=86400';
    }

    async function doLogin() {
      const u = document.getElementById('login-user').value.trim().toLowerCase();
      const p = document.getElementById('login-pass').value;
      if (!u || !p) { setError('{{ t("auth.username") }} und {{ t("auth.password") }} erforderlich.'); return; }
      setError('');
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, password: p })
      });
      const data = await res.json();
      if (data.ok) {
        setToken(data.token);
        const next = new URLSearchParams(location.search).get('next') || '/';
        location.href = next;
      } else {
        setError(data.error === 'invalid_login' ? 'Falscher Benutzername oder Passwort.' : (data.error || 'Login fehlgeschlagen.'));
      }
    }

    async function doRegister() {
      const u = document.getElementById('reg-user').value.trim().toLowerCase();
      const p = document.getElementById('reg-pass').value;
      if (!u || !p) { setError('Alle Felder erforderlich.'); return; }
      setError('');
      const res = await fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, password: p })
      });
      const data = await res.json();
      if (data.ok) {
        setToken(data.token);
        location.href = '/';
      } else {
        setError(data.error || 'Registrierung fehlgeschlagen.');
      }
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (document.getElementById('pane-login').style.display !== 'none') doLogin();
        else doRegister();
      }
    });

    // If already logged in, redirect
    const tok = localStorage.getItem('ogx_jwt');
    if (tok) location.href = new URLSearchParams(location.search).get('next') || '/';
  </script>
</body>
</html>
