<!DOCTYPE html>
<html lang="{{ lang or 'en' }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login — OGX Oracle</title>
  <meta name="csrf-token" content="{{ csrf_token }}">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/static/app.css" />
  <link rel="stylesheet" href="/static/login.css" />
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico?v=2" />
  <script src="/static/i18n.js"></script>
</head>
<body>

<div class="login-wrap">

  <div class="login-logo">
    <a href="/">
      <div class="brand-row">
        <span class="ogx">OGX</span>
        <span class="oracle">Oracle</span>
      </div>
      <span class="tagline">// Galaxy Intelligence System</span>
    </a>
  </div>

  <div class="login-card">

    <!-- Tabs -->
    <div class="login-tabs" id="login-tabs">
      <button class="login-tab active" id="tab-login" type="button">{{ t('auth.login') }}</button>
      <button class="login-tab" id="tab-register" type="button">{{ t('auth.register') }}</button>
    </div>

    <div class="login-error" id="auth-error"></div>

    <!-- Login pane -->
    <div id="pane-login">
      <div class="login-field">
        <label for="login-user">{{ t('auth.username') }}</label>
        <input type="text" id="login-user" autocomplete="username"
               placeholder="{{ t('auth.username') | lower }}" autofocus maxlength="32" />
      </div>
      <div class="login-field login-field-last">
        <label for="login-pass">{{ t('auth.password') }}</label>
        <input type="password" id="login-pass" autocomplete="current-password"
               placeholder="{{ t('auth.password') | lower }}" />
      </div>
      <button class="login-btn" id="btn-login" type="button">{{ t('auth.login') }}</button>
    </div>

    <!-- Register pane -->
    <div id="pane-register" hidden>
      <div class="login-policy">// {{ t('auth.pw_policy', n=(settings.password_min_len if settings else 10)) }}</div>
      <div class="login-field">
        <label for="reg-user">{{ t('auth.username') }}</label>
        <input type="text" id="reg-user" autocomplete="username"
               placeholder="{{ t('auth.username') | lower }}" maxlength="32" />
      </div>
      <div class="login-field login-field-last">
        <label for="reg-pass">{{ t('auth.password') }}</label>
        <input type="password" id="reg-pass" autocomplete="new-password"
               placeholder="{{ t('auth.password') | lower }}" />
      </div>
      <div class="login-field login-field-consent">
        <label class="login-consent-label">
          <input type="checkbox" id="reg-consent" />
          <span>{{ t('auth.consent_text') }} <a href="/privacy" target="_blank">{{ t('auth.consent_privacy') }}</a>.</span>
        </label>
      </div>
      <button class="login-btn login-btn-ghost" id="btn-register" type="button" disabled>{{ t('auth.create_account') }}</button>
    </div>

    <!-- Token pane — shown after successful login/register -->
    <div id="pane-token" hidden>
      <div class="success-head">
        <div class="success-icon">✓</div>
        <div>
          <div class="success-title" id="success-title">{{ t('auth.welcome_user') }}</div>
          <div class="success-sub">{{ t('auth.token_collector') }}</div>
        </div>
      </div>
      <div class="token-box">
        <div class="token-box-label">Bearer JWT Token</div>
        <textarea class="token-box-ta" id="token-ta" readonly spellcheck="false"></textarea>
        <div class="token-box-hint">{{ t('auth.token_hint') }}</div>
      </div>
      <div class="success-actions">
        <button class="login-btn" id="btn-copy" type="button">{{ t('auth.copy') }}</button>
        <a class="login-btn login-btn-ghost" href="/" id="btn-continue">{{ t('auth.continue') }} →</a>
      </div>
      <div class="success-copied" id="copied-msg">✓ {{ t('auth.copied') }}</div>
    </div>

  </div>
</div>

<script src="/static/login-consent.js"></script>
<script src="/static/login.js"></script>
</body>
</html>
